<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd93d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6bcb77;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative crossfire lines -->
  <line x1="100" y1="200" x2="500" y2="400" stroke="#ff6b6b" stroke-width="2" opacity="0.3" />
  <line x1="700" y1="200" x2="1100" y2="400" stroke="#6bcb77" stroke-width="2" opacity="0.3" />
  <line x1="500" y1="400" x2="700" y2="200" stroke="#ffd93d" stroke-width="2" opacity="0.3" />

  <!-- Proposer icon (left) -->
  <circle cx="250" cy="300" r="60" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.6" />
  <text x="250" y="310" font-family="Arial, sans-serif" font-size="40" fill="#ff6b6b" text-anchor="middle" opacity="0.8">P</text>

  <!-- VS spark -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#accent)" text-anchor="middle">VS</text>

  <!-- Challenger icon (right) -->
  <circle cx="950" cy="300" r="60" fill="none" stroke="#6bcb77" stroke-width="3" opacity="0.6" />
  <text x="950" y="310" font-family="Arial, sans-serif" font-size="40" fill="#6bcb77" text-anchor="middle" opacity="0.8">C</text>

  <!-- Title -->
  <text x="600" y="160" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">Crossfire</text>

  <!-- Accent bar -->
  <rect x="350" y="180" width="500" height="4" rx="2" fill="url(#accent)" opacity="0.8" />

  <!-- Subtitle -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="28" fill="#cccccc" text-anchor="middle">AI Adversarial Debate Engine</text>
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="20" fill="#888888" text-anchor="middle">Where AI agents debate, deeper insights emerge</text>

  <!-- Tech badges -->
  <rect x="380" y="555" width="100" height="28" rx="14" fill="#3178c6" opacity="0.8" />
  <text x="430" y="574" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">TypeScript</text>

  <rect x="500" y="555" width="80" height="28" rx="14" fill="#cc785c" opacity="0.8" />
  <text x="540" y="574" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Claude</text>

  <rect x="600" y="555" width="80" height="28" rx="14" fill="#10a37f" opacity="0.8" />
  <text x="640" y="574" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Codex</text>

  <rect x="700" y="555" width="80" height="28" rx="14" fill="#4285f4" opacity="0.8" />
  <text x="740" y="574" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Gemini</text>
</svg>
